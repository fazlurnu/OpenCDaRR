# Pairwise IPR run — the canonical Phase 2 example.
seed: 42
n_encounters: 2000

scenario:
  aircraft_type: M600
  speed: 10.2889       # m/s (~20 kts)
  dcpa_max: 50.0       # m — miss distance sampled in [0, dcpa_max]
  tlos: 60.0           # s
  pos_ci95: 0.0        # m — declared position accuracy, 95% radial (0 = perfect sensor)
  vel_ci95: 0.0        # m/s — declared velocity accuracy, 95% radial (0 = perfect sensor)

conflict:
  rpz: 50.0            # m
  t_lookahead: 120.0   # s

methods:
  detection: statebased
  resolution: mvp      # null for the no-resolution baseline
  recovery: pastcpa    # null to keep resolving (no recovery)
  margin: 1.05         # MVP resolution-zone buffer
  bouncing_guard: false

simulation:
  dt: 1.0                  # s — integration step
  t_max: 600.0             # s
  done_timeout: 10.0       # s
  broadcast_interval: 1.0  # s — CDR/measurement cadence (ADS-L rate); command held between ticks
